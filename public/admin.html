<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & S [PVT] LTD - Data Entry Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container fade-in">
        <header class="header">
            <div class="logo-container">
                <img src="assets/logo.png" alt="S & S [PVT] LTD Logo" class="logo" onerror="this.src='https://via.placeholder.com/150?text=S%26S+Logo';">
            </div>
            <h1>Admin Panel</h1>
            <p>Insert New Auction Data</p>
            <a href="index.html" class="admin-link">Back to Search</a>
        </header>

        <div class="admin-section glass-panel">
            <h2 class="form-title">Applicant Details Form</h2>
            <form id="admin-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="applicant_id">Applicant ID (NIC)</label>
                        <input type="text" id="applicant_id" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="address">Address</label>
                        <input type="text" id="address" required>
                    </div>
                    <div class="form-group">
                        <label for="refundable_deposit">Refundable Deposit (LKR)</label>
                        <input type="number" id="refundable_deposit" required>
                    </div>
                    <div class="form-group">
                        <label for="vehicle_category">Vehicle Category</label>
                        <select id="vehicle_category" required>
                            <option value="">Select Category</option>
                            <option value="Car">Car</option>
                            <option value="Van">Van</option>
                            <option value="SUV">SUV</option>
                            <option value="Truck">Truck</option>
                            <option value="Motorcycle">Motorcycle</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="vehicle_registration_number">Vehicle Registration Number</label>
                        <input type="text" id="vehicle_registration_number" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="mileage">Vehicle Mileage (km)</label>
                        <input type="number" id="mileage" placeholder="e.g. 45000" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="vehicle_image_file">Vehicle Photo Upload</label>
                        <input type="file" id="vehicle_image_file" accept="image/*">
                        <small style="color: #cbd5e1; font-size: 0.8rem;">(Or leave empty and provide a URL below)</small>
                    </div>
                    <div class="form-group full-width">
                        <label for="vehicle_image">Vehicle Photo URL (Link) - Optional</label>
                        <input type="url" id="vehicle_image" placeholder="https://example.com/car.jpg">
                    </div>
                    <div class="form-group">
                        <label for="auction_date">Auction Date & Time</label>
                        <input type="datetime-local" id="auction_date" required>
                    </div>
                    <div class="form-group">
                        <label for="auction_category_start_date">Auction Category Start Date</label>
                        <input type="date" id="auction_category_start_date" required>
                    </div>
                    <div class="form-group">
                        <label for="starting_bid">Starting Bid (LKR)</label>
                        <input type="number" id="starting_bid" required>
                    </div>
                </div>
                
                <div id="notification" class="hidden"></div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="submit-btn">Save Data</button>
                    <button type="reset" class="btn-secondary">Clear</button>
                </div>
            </form>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
            </div>
            <div id="error-message" class="error hidden"></div>
        </div>

        <div class="manage-section glass-panel" style="margin-top: 2rem;">
            <h2>Manage Existing Records</h2>
            <div class="table-responsive" style="overflow-x: auto; margin-top: 1rem;">
                <table id="records-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(255,255,255,0.1);">
                            <th style="padding: 1rem;">ID</th>
                            <th style="padding: 1rem;">Name</th>
                            <th style="padding: 1rem;">Category</th>
                            <th style="padding: 1rem;">Reg No.</th>
                            <th style="padding: 1rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="records-tbody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
